name: Notify docs — example added or updated

# When any PR merges to main, check whether it touched an examples/ directory.
# For each example that changed, open an issue in deepgram/deepgram-docs with
# full context so a content writer can pick it up and turn it into a guide.
#
# Required secrets:
#   DOCS_PAT — PAT with issues:write scope on deepgram/deepgram-docs

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    name: Notify docs of changed examples
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2   # need HEAD and HEAD~1 to detect new vs updated
          ref: main

      - name: Find changed example directories
        id: examples
        run: |
          DIRS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^examples/' \
            | cut -d/ -f1-2 \
            | sort -u \
            | grep -E '^examples/[0-9]{3}-' || true)

          if [ -z "$DIRS" ]; then
            echo "No example directories changed — skipping"
            echo "dirs=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed examples: $DIRS"
            # Newlines -> space-separated for matrix-style iteration
            echo "dirs=$(echo "$DIRS" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create docs issues for each changed example
        if: steps.examples.outputs.dirs != ''
        env:
          GH_TOKEN: ${{ secrets.DOCS_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          for EXAMPLE_DIR in ${{ steps.examples.outputs.dirs }}; do
            SLUG=$(basename "$EXAMPLE_DIR")

            # Determine whether this is a new example or an update
            if git show HEAD~1:"${EXAMPLE_DIR}/README.md" &>/dev/null; then
              ACTION="updated"
              ISSUE_TITLE="Tutorial update: ${SLUG}"
            else
              ACTION="added"
              ISSUE_TITLE="Tutorial opportunity: ${SLUG}"
            fi

            echo "Processing $SLUG ($ACTION)"

            # Build the issue body in Python — handles multi-line content safely
            python3 .github/scripts/build_docs_issue_body.py "$EXAMPLE_DIR" "$SLUG" "$ACTION"

            # Create the issue in deepgram-docs
            gh issue create \
              --repo deepgram/deepgram-docs \
              --title "$ISSUE_TITLE" \
              --label "type:suggestion" \
              --body-file /tmp/docs-issue-body.md

            echo "Issue created for $SLUG"
          done

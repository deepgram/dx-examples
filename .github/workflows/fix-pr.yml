name: Fix PR

# NOTE: This workflow only fires when a label is added by a HUMAN (not by
# GITHUB_TOKEN). For bot-owned PRs, labels added by other workflows do not
# trigger this. The process-open-prs.yml cron is the primary fix driver for
# agent PRs. This workflow handles the case where a human manually applies
# status:fix-needed to flag a PR for repair.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true

concurrency:
  group: fix-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    # For label events: only trigger on the specific fix label
    # For manual dispatch: always run
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'status:fix-needed'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          BRANCH=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.branch }}

      - name: Configure git
        run: |
          git config user.name "dx-examples-bot"
          git config user.email "noreply@deepgram.com"

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Check fix attempt count
        id: attempt-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          FIX_COMMITS=$(git log --oneline --author="dx-examples-bot" | grep "^[a-f0-9]* fix(" | wc -l | tr -d ' ')
          echo "fix_attempts=$FIX_COMMITS" >> $GITHUB_OUTPUT
          if [ "$FIX_COMMITS" -ge 3 ]; then
            echo "max_reached=true" >> $GITHUB_OUTPUT
            gh pr comment $PR_NUMBER --body "@deepgram-devrel — the fix agent has made 3 repair attempts on this PR and tests are still failing. Manual intervention needed."
          else
            echo "max_reached=false" >> $GITHUB_OUTPUT
          fi

      - name: Run fix agent
        if: steps.attempt-check.outputs.max_reached == 'false'
        uses: anthropics/claude-code-action@beta
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: 1908afc6-c134-4c6f-a684-ed7d8ce91759
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          direct_prompt: |
            Read and execute the instructions in `instructions/fix-example.md`.

            Context:
            - PR_NUMBER: ${{ steps.pr.outputs.number }}
            - PR_BRANCH: ${{ steps.pr.outputs.branch }}
            - Today's date: ${{ steps.date.outputs.date }}
            - Repository: ${{ github.repository }}
            - Fix attempt: ${{ steps.attempt-check.outputs.fix_attempts }} of 3

name: Review PR

# NOTE: This workflow fires on pull_request events, which only trigger when the
# PR author or updater is NOT using GITHUB_TOKEN. For human-opened PRs this
# fires correctly. For agent PRs (opened via GITHUB_TOKEN), process-open-prs.yml
# is the primary review driver. Both paths end up calling review-example.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true

concurrency:
  group: review-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # For PR events: match by title or label
    # For manual dispatch: always run
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.pull_request.title, '[Example]') ||
      startsWith(github.event.pull_request.title, '[Fix]') ||
      contains(github.event.pull_request.labels.*.name, 'type:example') ||
      contains(github.event.pull_request.labels.*.name, 'type:fix')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number and branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          TITLE=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json title --jq '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          SHA=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json headRefOid --jq '.headRefOid')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.sha }}

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run review agent
        uses: anthropics/claude-code-action@beta
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: 1908afc6-c134-4c6f-a684-ed7d8ce91759
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Glob,Grep"
          direct_prompt: |
            Read and execute the instructions in `instructions/review-example.md`.

            Context:
            - PR_NUMBER: ${{ steps.pr.outputs.number }}
            - PR_TITLE: ${{ steps.pr.outputs.title }}
            - Today's date: ${{ steps.date.outputs.date }}
            - Repository: ${{ github.repository }}
